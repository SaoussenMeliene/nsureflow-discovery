server:
  port: ${PORT:8761}  # ✅ Render utilise PORT automatiquement

spring:
  application:
    name: discovery-service

eureka:
  instance:
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}  # ✅ Render
    prefer-ip-address: false
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    com.satoripop.insureflow: DEBUG
